<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; padding: 16px; background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
    h3 { margin: 0 0 10px; color: #60a5fa; }
    .section { background: #1e2937; padding: 12px; border-radius: 10px; margin-bottom: 16px; }
    input, select, textarea, button { width: 100%; padding: 9px; margin: 6px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: #e2e8f0; font-size: 14px; box-sizing: border-box; }
    button { background: #3b82f6; color: white; border: none; font-weight: 600; cursor: pointer; }
    button:hover { background: #2563eb; }
    .hidden { display: none; }
    #output { background: #0f172a; padding: 10px; border-radius: 8px; white-space: pre-wrap; margin-top: 8px; font-size: 13px; }
    .reel { width: 52px; height: 52px; background: #1e2937; border: 2px solid #475569; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
  </style>
</head>
<body>

  <!-- AI ПОМОЩНИК -->
  <div class="section">
    <h3>🤖 AI Помощник</h3>

    <div id="api-header" style="display:flex; justify-content:space-between; cursor:pointer; margin-bottom:6px; font-size:13px;">
      <span>Groq API Key</span>
      <span id="api-toggle">▼</span>
    </div>
    <div id="api-section" class="hidden">
      <input type="password" id="api-key" placeholder="gsk_...">
      <button id="save-key-btn">Сохранить ключ</button>
      <a href="#" id="how-to-get-key" style="font-size:12px; color:#94a3b8; display:block; margin-top:4px;">Как получить ключ?</a>
    </div>

    <label style="font-size:13px;">Тип задачи</label>
    <select id="task-type">
      <option value="message">Сообщение (по запросу)</option>
      <option value="reply">Ответ на письмо</option>
      <option value="invite_man">Инвайт для мужчины</option>
      <option value="message_to_man">Сообщение мужчине</option>
      <option value="message_with_profile">Сообщение с профилем</option>
    </select>

    <label style="font-size:13px;">Твой запрос</label>
    <textarea id="prompt" rows="3" placeholder="Основной запрос..."></textarea>

    <label style="font-size:13px;">Дополнительный контекст (опционально)</label>
    <textarea id="extra-context" rows="2" placeholder="Например: сделай более эмоциональным..."></textarea>

    <button id="generate-btn">Сгенерировать</button>

    <div id="output" class="hidden"></div>
  </div>

  <!-- ИГРОВОЙ АВТОМАТ -->
  <div class="section">
    <h3 style="color:#c084fc; text-align:center;">🎰 Игровой автомат</h3>
    <div style="display:flex; justify-content:center; gap:8px; margin:12px 0;">
      <div id="reel1" class="reel">7️⃣</div>
      <div id="reel2" class="reel">❤️</div>
      <div id="reel3" class="reel">☠️</div>
    </div>
    <button id="spin-btn">Крутить</button>
    <div id="slot-result" style="margin-top:10px; text-align:center; min-height:24px; font-size:14px;"></div>
  </div>

<script src="popup.js"></script>
</body>
</html>

<div style="margin-top: 8px; font-size: 12px; color: #64748b; text-align: center;">
  <span id="help-toggle" style="cursor: pointer; text-decoration: underline;">ℹ️ Как пользоваться AI</span>
  <div id="help-text" class="hidden" style="margin-top: 8px; text-align: left; background: #1e2937; padding: 10px; border-radius: 8px; font-size: 12px; line-height: 1.4;">
    1. Получи бесплатный ключ на <a href="https://console.groq.com/keys" target="_blank" style="color:#60a5fa;">console.groq.com/keys</a><br>
    2. Вставь ключ и сохрани<br>
    3. Выбери тип задачи и напиши запрос<br>
    4. Нажми «Сгенерировать»
  </div>
</div>
